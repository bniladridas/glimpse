name: Nightly prerelease

on:
  workflow_dispatch:
  schedule:
    - cron: "20 2 * * *"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  web:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Package web app
        run: zip -r glimpse-web-nightly.zip dist

      - name: Upload web artifact
        uses: actions/upload-artifact@v7
        with:
          name: glimpse-web-nightly
          path: glimpse-web-nightly.zip

  macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build macOS DMG
        run: npm run desktop:dmg -- --publish never
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_DESKTOP_REDIRECT_URL: ${{ secrets.VITE_SUPABASE_DESKTOP_REDIRECT_URL }}

      - name: Package macOS app
        run: |
          cp release/*.dmg glimpse-macos-nightly.dmg
          cp release/latest-mac.yml glimpse-macos-latest-mac.yml

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v7
        with:
          name: glimpse-macos-nightly
          path: |
            glimpse-macos-nightly.dmg
            glimpse-macos-latest-mac.yml

  android:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install dependencies
        run: npm ci

      - name: Build Android debug APK
        run: npm run android:apk
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_ANDROID_REDIRECT_URL: ${{ secrets.VITE_SUPABASE_ANDROID_REDIRECT_URL }}

      - name: Package Android app
        run: cp android/app/build/outputs/apk/debug/app-debug.apk glimpse-android-nightly.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v7
        with:
          name: glimpse-android-nightly
          path: glimpse-android-nightly.apk

  publish:
    runs-on: ubuntu-latest
    needs: [web, macos, android]
    env:
      HAS_GITHUB_APP_CLIENT_TOKEN: ${{ secrets.GLIMPSE_APP_CLIENT_ID != '' && secrets.GLIMPSE_APP_PRIVATE_KEY != '' }}
      HAS_GITHUB_APP_ID_TOKEN: ${{ secrets.GLIMPSE_APP_ID != '' && secrets.GLIMPSE_APP_PRIVATE_KEY != '' }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Create GitHub App token
        id: app-token
        if: ${{ env.HAS_GITHUB_APP_CLIENT_TOKEN == 'true' }}
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.GLIMPSE_APP_CLIENT_ID }}
          private-key: ${{ secrets.GLIMPSE_APP_PRIVATE_KEY }}

      - name: Create GitHub App token from app ID
        id: app-token-legacy
        if: ${{ env.HAS_GITHUB_APP_CLIENT_TOKEN != 'true' && env.HAS_GITHUB_APP_ID_TOKEN == 'true' }}
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GLIMPSE_APP_ID }}
          private-key: ${{ secrets.GLIMPSE_APP_PRIVATE_KEY }}

      - name: Download nightly artifacts
        uses: actions/download-artifact@v8
        with:
          path: nightly

      - name: Prepare nightly release notes
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VESPER_GEMINI_API_KEY: ${{ secrets.VESPER_GEMINI_API_KEY }}
          GEMINI_RELEASE_MODEL: ${{ vars.GEMINI_RELEASE_MODEL }}
        run: |
          node <<'EOF'
          const fs = require("fs");
          const { execFileSync } = require("child_process");

          const apiKey = process.env.GEMINI_API_KEY || process.env.VESPER_GEMINI_API_KEY;
          const model = process.env.GEMINI_RELEASE_MODEL || "gemini-3.5-flash";
          const fallbackSummary = "nightly app builds were refreshed.";
          const fallbackBullets = ["built web, macos, and android assets."];
          const weakEndings = new Set(["a", "an", "and", "as", "at", "by", "for", "from", "in", "of", "on", "or", "the", "to", "with"]);

          function git(args) {
            return execFileSync("git", args, { encoding: "utf8" }).trim();
          }

          function normalizeSentence(value) {
            let text = String(value || "").trim().replace(/\s+/g, " ");
            text = text.replace(/^[-*]\s+/, "");

            if (!text) {
              return "";
            }

            if (!/[.!?]$/.test(text)) {
              text = `${text}.`;
            }

            return text;
          }

          function validateSummary(summary) {
            const text = normalizeSentence(summary);
            if (!text || text.length > 180) {
              return "";
            }

            const words = text.toLowerCase().replace(/[.!?]$/, "").split(/\s+/);
            if (words.length < 5 || weakEndings.has(words[words.length - 1])) {
              return "";
            }

            return text;
          }

          function validateBullet(bullet) {
            const text = normalizeSentence(bullet);
            if (!text || text.length > 160) {
              return "";
            }

            const words = text.toLowerCase().replace(/[.!?]$/, "").split(/\s+/);
            if (weakEndings.has(words[words.length - 1])) {
              return "";
            }

            return text;
          }

          function formatNotes(summary, bullets) {
            const lines = [summary, ""];

            if (bullets.length > 0) {
              lines.push(...bullets.map((bullet) => `- ${bullet}`), "");
            }

            return lines.join("\n");
          }

          function writeNotes(summary, bullets) {
            fs.writeFileSync("nightly-release-summary.txt", `${summary}\n`);
            fs.writeFileSync("nightly-release-model.txt", `${model}\n`);
            fs.writeFileSync("nightly-release-notes.md", formatNotes(summary, bullets));
          }

          function writeFallback() {
            writeNotes(fallbackSummary, fallbackBullets);
          }

          function parseGeneratedJson(text) {
            let source = text.replace(/^```(?:json)?\s*/i, "").replace(/\s*```$/, "").trim();
            if (!source.startsWith("{")) {
              const match = source.match(/\{[\s\S]*/);
              source = match ? match[0] : source;
            }

            try {
              return JSON.parse(source);
            } catch {
              const summaryMatch = source.match(/"summary"\s*:\s*"([^"]*)/);
              const bulletMatches = [...source.matchAll(/"([^"]+?)"/g)]
                .map((match) => match[1])
                .filter((value) => value !== "summary" && value !== "bullets");

              if (!summaryMatch && bulletMatches.length === 0) {
                throw new Error("invalid gemini json");
              }

              return {
                summary: summaryMatch?.[1] || "",
                bullets: bulletMatches.filter((value) => value !== summaryMatch?.[1]),
              };
            }
          }

          try {
            execFileSync("git", ["fetch", "--force", "origin", "tag", "nightly"], { stdio: "ignore" });
          } catch {
            // First nightly runs may not have a previous moving tag yet.
          }

          let range = "HEAD~10..HEAD";
          try {
            git(["rev-parse", "--verify", "refs/tags/nightly"]);
            range = "nightly..HEAD";
          } catch {
            // Use the fallback range above.
          }

          let commits = "";
          try {
            commits = git(["log", "--no-merges", "--format=%h %s", range]);
          } catch {
            commits = git(["log", "--no-merges", "--format=%h %s", "-10"]);
          }

          if (!commits) {
            writeFallback();
            process.exit(0);
          }

          if (!apiKey) {
            writeFallback();
            process.exit(0);
          }

          const prompt = [
            "Write quiet GitHub prerelease notes for a nightly build as JSON.",
            "Return only valid JSON with this shape: {\"summary\":\"...\",\"bullets\":[\"...\"]}.",
            "Use lowercase except product names.",
            "Do not oversell. Do not mention internal workflow mechanics.",
            "Base the notes only on the commit subjects below.",
            "Write complete sentences, not fragments.",
            "Summary must be one short sentence.",
            `If the commits do not clearly describe an app-facing change, use this exact summary: ${fallbackSummary}`,
            "Bullets are optional. If included, bullets must contain one to four complete, past-tense sentences.",
            "Do not include an assets section. Do not mention asset filenames.",
            "Example input: docs: refresh nightly note",
            "Example output: {\"summary\":\"this nightly build refreshes the project notes.\",\"bullets\":[\"refreshed the nightly note.\"]}",
            "",
            "commits:",
            commits,
          ].join("\n");

          const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;

          async function writeGeminiNotes() {
            const response = await fetch(endpoint, {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: {
                  temperature: 0.2,
                  maxOutputTokens: 512,
                  responseMimeType: "application/json",
                  responseSchema: {
                    type: "object",
                    properties: {
                      summary: { type: "string" },
                      bullets: {
                        type: "array",
                        items: { type: "string" },
                      },
                    },
                    required: ["summary"],
                  },
                },
              }),
            });

            if (!response.ok) {
              throw new Error(`gemini ${response.status}`);
            }

            const data = await response.json();
            let text = data.candidates?.[0]?.content?.parts?.map((part) => part.text || "").join("").trim();

            if (!text) {
              throw new Error("empty gemini response");
            }

            const parsed = parseGeneratedJson(text);
            const summary = validateSummary(parsed.summary);
            const bullets = Array.isArray(parsed.bullets)
              ? parsed.bullets.map(validateBullet).filter(Boolean).slice(0, 4)
              : [];

            if (!summary) {
              throw new Error("invalid gemini notes");
            }

            writeNotes(summary, bullets);
          }

          writeGeminiNotes().catch((error) => {
            console.warn(`release note generation fell back: ${error.message}`);
            writeFallback();
          });
          EOF

      - name: Move nightly tag
        env:
          PUSH_TOKEN: ${{ steps.app-token.outputs.token || steps.app-token-legacy.outputs.token || github.token }}
        run: |
          auth_remote="https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git tag --force nightly "$GITHUB_SHA"
          git push --force "${auth_remote}" nightly

      - name: Publish nightly prerelease
        uses: softprops/action-gh-release@v3
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || steps.app-token-legacy.outputs.token || github.token }}
        with:
          tag_name: nightly
          name: Nightly
          prerelease: true
          make_latest: false
          overwrite_files: true
          body_path: nightly-release-notes.md
          files: |
            nightly/glimpse-web-nightly/glimpse-web-nightly.zip
            nightly/glimpse-macos-nightly/glimpse-macos-nightly.dmg
            nightly/glimpse-macos-nightly/glimpse-macos-latest-mac.yml
            nightly/glimpse-android-nightly/glimpse-android-nightly.apk

      - name: Refresh branch
        env:
          PUSH_TOKEN: ${{ steps.app-token.outputs.token || steps.app-token-legacy.outputs.token || github.token }}
        run: |
          auth_remote="https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git pull --ff-only "${auth_remote}" "${GITHUB_REF_NAME}"

      - name: Update README nightly note
        run: |
          node <<'EOF'
          const fs = require("fs");

          const readmePath = "README.md";
          const start = "<!-- nightly:start -->";
          const end = "<!-- nightly:end -->";
          const date = new Date().toISOString().slice(0, 10);
          const sha = process.env.GITHUB_SHA.slice(0, 7);
          const repo = process.env.GITHUB_REPOSITORY;
          const releaseUrl = `https://github.com/${repo}/releases/tag/nightly`;
          const summary = fs.readFileSync("nightly-release-summary.txt", "utf8").trim();
          const model = fs.readFileSync("nightly-release-model.txt", "utf8").trim();
          const next = `${start}\nnightly: [${date}](${releaseUrl}) · \`${sha}\` · ${model}\nnote: ${summary}\n${end}`;
          const readme = fs.readFileSync(readmePath, "utf8");
          const pattern = new RegExp(`${start}[\\s\\S]*?${end}`);

          if (!pattern.test(readme)) {
            throw new Error("nightly README markers not found");
          }

          fs.writeFileSync(readmePath, readme.replace(pattern, next));
          EOF

      - name: Commit README nightly note
        env:
          APP_SLUG: ${{ steps.app-token.outputs.app-slug || steps.app-token-legacy.outputs.app-slug }}
          PUSH_TOKEN: ${{ steps.app-token.outputs.token || steps.app-token-legacy.outputs.token || github.token }}
        run: |
          if git diff --quiet README.md; then
            exit 0
          fi

          if [ -n "${APP_SLUG}" ]; then
            git config user.name "${APP_SLUG}[bot]"
            git config user.email "${APP_SLUG}[bot]@users.noreply.github.com"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          fi

          summary="$(cat nightly-release-summary.txt)"
          model="$(cat nightly-release-model.txt)"
          git add README.md
          git commit \
            -m "docs: refresh nightly note" \
            -m "release: https://github.com/${GITHUB_REPOSITORY}/releases/tag/nightly" \
            -m "model: ${model}" \
            -m "note: ${summary}"
          auth_remote="https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push "${auth_remote}" HEAD:${GITHUB_REF_NAME}
